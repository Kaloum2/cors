name: cors-engine

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gfortran libsqlite3-dev

      - name: Build
        run: ./scripts/build.sh

      - name: Sidecar PING smoke (TST-04)
        run: |
          python3 scripts/cli-sidecar.py \
            --engine build/cors-engine \
            --config conf/validation/cors-lab.conf \
            --workdir . &
          SIDECAR_PID=$!
          sleep 3
          python3 -c "
          import socket
          s = socket.create_connection(('127.0.0.1', 7998), 5)
          s.sendall(b'PING\n')
          data = s.recv(256).decode()
          s.close()
          assert 'PONG' in data, data
          assert '__END__' in data, data
          print('PING OK:', data.strip())
          "
          kill $SIDECAR_PID || true

      - name: CLI validation unit checks
        working-directory: scripts
        run: |
          python3 -c "
          from cli_validation import validate_cli_line
          validate_cli_line('showbls')
          validate_cli_line('PING')
          try:
              validate_cli_line('rm -rf /')
          except ValueError:
              pass
          else:
              raise SystemExit('expected reject')
          "

      - name: Docker build smoke
        run: docker build -f docker/Dockerfile -t cors-engine:ci .
