# Correction modes configuration
vrs-dynamic-move-thresh-m = 1000
auto-vrs-min-fixed-bls    = 2
auto-mac-min-fixed-bls    = 3
auto-fkp-min-stations     = 3

# Source RINEX: daily OBS per station + combined mixed NAV
source-rinex-enable       = 1
source-rinex-dir          = build/source_rinex
# Periodic flush (seconds); 0 = midnight/shutdown only; capped at 86400 (24 h)
# Aliases: source-rinex-flush-h = hours (e.g. 6 → 21600 s)
source-rinex-flush-sec     = 3600
# OBS: {STATION}_{YYYYMMDD}.obs   NAV: CORS_{YYYYMMDD}.nav (append on each flush)
